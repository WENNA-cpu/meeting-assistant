services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meeting-assistant-backend
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/uploads
    environment:
      - DATABASE_URL=sqlite:////app/data/meeting_assistant.db
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meeting-assistant-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
  backend-uploads:
